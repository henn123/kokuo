<!DOCTYPE html>
<html lang="id">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue turn checking</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: auto; }
        input, button { padding: 12px; width: 100%; margin: 10px 0; box-sizing: border-box; }
        #hasil { font-size: 1.1em; font-weight: bold; color: #2c3e50; margin-top: 10px; padding: 15px; background: #e8f4fd; border-radius: 8px; border-left: 5px solid #3498db; }
    </style>
</head>
<body>
    <h2>Queue</h2>
    
    <label>Who's on now?</label>
    <input type="text" id="sekarangInput" placeholder="Type the name..">
    <button onclick="hitung()">Check for your turn</button>

    <div id="hasil">The result.. </div>

    <script>
        const daftar = [ "karyadi","widi", "ega", "dika", "jamal","anam","robi", "sapar","iman", "rizki", "hendra","dedi","sandi","riyan","kholik",
            "irul", "irul", "cece", "suheli","rohman", "rafli", "irawan","iqna", "farli","indra","zain","yakub","hendri","firman","andila","amir"];
        const namaku = "hendri";

        function hitung() {
            let input = document.getElementById('sekarangInput').value.toLowerCase().trim();
            let indexSekarang = daftar.indexOf(input);
            let indexKu = daftar.indexOf(namaku);

            if (indexSekarang === -1) {
                document.getElementById('hasil').innerText = "Name not found";
                return;
            }

            if (indexSekarang === indexKu) {
                document.getElementById('hasil').innerText = "Now is your turn!";
                return;
            }

            // Mencari siapa saja yang ada di antara giliran sekarang sampai sebelum namaku
            let sisaOrang = [];
            let i = (indexSekarang + 1) % daftar.length;
            
            while (i !== indexKu) {
                sisaOrang.push(daftar[i]);
                i = (i + 1) % daftar.length;
            }

            let jumlah = sisaOrang.length;
            let daftarNama = sisaOrang.join(", ");
            
            document.getElementById('hasil').innerText = `Still got ${jumlah} people: ${daftarNama}.`;
        }
    </script>
</body>
</html>
